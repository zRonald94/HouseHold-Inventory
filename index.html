<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Household Inventory</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-sec: #f5f5f3;
    --bg-ter: #eeede9;
    --text: #1a1a18;
    --text-sec: #5f5e5a;
    --text-ter: #888780;
    --border: rgba(0,0,0,0.12);
    --border-sec: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --green-bg: #EAF3DE; --green-text: #3B6D11; --green-border: #5DCAA5;
    --amber-bg: #FAEEDA; --amber-text: #854F0B; --amber-border: #EF9F27;
    --red-bg: #FCEBEB; --red-text: #A32D2D; --red-border: #E24B4A;
    --teal-bg: #E1F5EE; --teal-text: #0F6E56; --teal-border: #1D9E75;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg-sec: #2a2a28; --bg-ter: #333331;
      --text: #f0efe9; --text-sec: #b4b2a9; --text-ter: #888780;
      --border: rgba(255,255,255,0.1); --border-sec: rgba(255,255,255,0.2);
      --green-bg: #173404; --green-text: #C0DD97;
      --amber-bg: #412402; --amber-text: #FAC775;
      --red-bg: #501313; --red-text: #F7C1C1;
      --teal-bg: #04342C; --teal-text: #9FE1CB;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-ter);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 { font-size: 17px; font-weight: 500; color: var(--text); }
  header span { font-size: 13px; color: var(--text-ter); }

  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

  .tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .tab {
    padding: 8px 20px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-sec); background: transparent;
    font-size: 14px; cursor: pointer; color: var(--text-sec);
    transition: all 0.15s; font-family: inherit;
  }
  .tab.active { background: var(--bg); color: var(--text); border-color: var(--border-sec); font-weight: 500; }
  .tab:hover:not(.active) { background: var(--bg-sec); }

  .badge {
    display: inline-block; background: var(--teal-bg); color: var(--teal-text);
    border-radius: 999px; font-size: 11px; padding: 1px 7px; margin-left: 5px; font-weight: 500;
  }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--bg); border-radius: var(--radius-md); padding: 14px; border: 0.5px solid var(--border); }
  .stat-label { font-size: 12px; color: var(--text-sec); margin-bottom: 4px; }
  .stat-val { font-size: 24px; font-weight: 500; }

  .add-form {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem;
  }
  .form-label { font-size: 13px; font-weight: 500; color: var(--text-sec); margin-bottom: 10px; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }

  input, select, button {
    font-family: inherit; font-size: 14px;
    background: var(--bg-sec); color: var(--text);
    border: 0.5px solid var(--border-sec); border-radius: var(--radius-md);
    padding: 8px 12px; outline: none;
  }
  input::placeholder { color: var(--text-ter); }
  input:focus, select:focus { border-color: var(--teal-border); box-shadow: 0 0 0 2px rgba(29,158,117,0.15); }
  button { cursor: pointer; background: var(--bg); transition: all 0.15s; }
  button:hover { background: var(--bg-sec); }
  button:active { transform: scale(0.98); }

  .search-bar { margin-bottom: 10px; }
  .search-bar input { width: 100%; }

  .cat-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .cat-pill {
    padding: 5px 13px; border-radius: 999px; border: 0.5px solid var(--border);
    background: transparent; font-size: 12px; cursor: pointer; color: var(--text-sec);
    transition: all 0.15s; font-family: inherit;
  }
  .cat-pill.active { background: var(--bg); color: var(--text); border-color: var(--border-sec); font-weight: 500; }

  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }

  .item-card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 14px; position: relative;
    transition: border-color 0.2s;
  }
  .item-card.low { border-color: var(--amber-border); }
  .item-card.out { border-color: var(--red-border); }
  .item-card.on-list { border-color: var(--teal-border); }

  .item-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
  .item-cat { font-size: 11px; color: var(--text-ter); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; }

  .qty-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 0.5px solid var(--border-sec); background: transparent;
    cursor: pointer; font-size: 18px; color: var(--text-sec);
    display: flex; align-items: center; justify-content: center; padding: 0;
    line-height: 1; transition: background 0.1s;
  }
  .qty-btn:hover { background: var(--bg-sec); }
  .qty-val { font-size: 17px; font-weight: 500; min-width: 30px; text-align: center; }
  .qty-unit { font-size: 12px; color: var(--text-ter); }

  .status-badge {
    display: inline-flex; align-items: center; font-size: 11px;
    padding: 3px 9px; border-radius: 999px; font-weight: 500;
  }
  .badge-ok { background: var(--green-bg); color: var(--green-text); }
  .badge-low { background: var(--amber-bg); color: var(--amber-text); }
  .badge-out { background: var(--red-bg); color: var(--red-text); }
  .badge-list { background: var(--teal-bg); color: var(--teal-text); }

  .list-btn {
    width: 100%; margin-top: 10px; padding: 7px; font-size: 12px;
    border-radius: var(--radius-md); border: 0.5px solid var(--border-sec);
    background: transparent; cursor: pointer; color: var(--text-sec);
    transition: all 0.15s;
  }
  .list-btn:hover { background: var(--bg-sec); }
  .list-btn.on { background: var(--teal-bg); color: var(--teal-text); border-color: var(--teal-border); }

  .remove-item-btn {
    position: absolute; top: 10px; right: 10px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text-ter); font-size: 15px; padding: 2px 5px;
    border-radius: 4px; line-height: 1;
  }
  .remove-item-btn:hover { color: var(--red-text); background: var(--red-bg); }

  .section-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }

  .grocery-list { display: flex; flex-direction: column; gap: 6px; }
  .grocery-group-label {
    font-size: 11px; font-weight: 500; color: var(--text-ter);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-top: 10px; margin-bottom: 2px; padding-left: 2px;
  }
  .grocery-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 12px 14px;
    transition: opacity 0.2s;
  }
  .grocery-item.checked { opacity: 0.4; }
  .grocery-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--teal-border); flex-shrink: 0; }
  .grocery-item-name { flex: 1; font-size: 14px; }
  .grocery-remove { background: transparent; border: none; cursor: pointer; color: var(--text-ter); font-size: 18px; padding: 0 4px; border-radius: 4px; line-height: 1; }
  .grocery-remove:hover { color: var(--red-text); background: var(--red-bg); }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-ter); font-size: 14px; }

  .manual-add-form {
    background: var(--bg-sec); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 1rem; display: none;
  }

  .save-indicator {
    position: fixed; bottom: 1rem; right: 1rem;
    background: var(--teal-bg); color: var(--teal-text);
    border-radius: var(--radius-md); padding: 8px 14px;
    font-size: 13px; font-weight: 500; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .save-indicator.show { opacity: 1; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .item-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    header { padding: 0.75rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🏠 Household Inventory</h1>
  <span id="last-saved"></span>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('inventory')">Inventory</button>
    <button class="tab" onclick="showTab('grocery')">Grocery list<span class="badge" id="grocery-badge" style="display:none"></span></button>
  </div>

  <!-- INVENTORY TAB -->
  <div id="tab-inventory">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total items</div><div class="stat-val" id="s-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Well stocked</div><div class="stat-val" id="s-ok" style="color:var(--green-text)">0</div></div>
      <div class="stat-card"><div class="stat-label">Running low</div><div class="stat-val" id="s-low" style="color:var(--amber-text)">0</div></div>
      <div class="stat-card"><div class="stat-label">Out of stock</div><div class="stat-val" id="s-out" style="color:var(--red-text)">0</div></div>
    </div>

    <div class="add-form">
      <div class="form-label">Add new item</div>
      <div class="form-row">
        <input type="text" id="new-name" placeholder="Item name" style="flex:2;min-width:130px" />
        <select id="new-cat" style="flex:1;min-width:110px">
          <option value="Pantry">Pantry</option>
          <option value="Dairy">Dairy</option>
          <option value="Produce">Produce</option>
          <option value="Frozen">Frozen</option>
          <option value="Meat">Meat</option>
          <option value="Bathroom">Bathroom</option>
          <option value="Cleaning">Cleaning</option>
          <option value="Snacks">Snacks</option>
          <option value="Drinks">Drinks</option>
          <option value="Spices">Spices</option>
          <option value="Other">Other</option>
        </select>
        <input type="number" id="new-qty" placeholder="Qty" min="0" style="width:80px;flex:none" />
        <input type="text" id="new-unit" placeholder="Unit (rolls, kg...)" style="width:130px;flex:none" />
        <input type="number" id="new-low" placeholder="Low at" min="0" style="width:85px;flex:none" title="Flag as low when quantity reaches this number" />
        <button onclick="addItem()" style="padding:8px 18px;font-weight:500">Add item</button>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="Search items..." oninput="render()" />
    </div>
    <div class="cat-filter" id="cat-filter"></div>
    <div class="item-grid" id="item-grid"></div>
  </div>

  <!-- GROCERY TAB -->
  <div id="tab-grocery" style="display:none">
    <div class="stats-row" style="grid-template-columns:repeat(2,1fr)">
      <div class="stat-card"><div class="stat-label">Items to buy</div><div class="stat-val" id="g-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Checked off</div><div class="stat-val" id="g-done" style="color:var(--green-text)">0</div></div>
    </div>

    <div class="section-actions">
      <button onclick="toggleManualAdd()">+ Add item manually</button>
      <button onclick="addAllLow()">+ Add all low / out of stock</button>
      <button onclick="clearChecked()" style="color:var(--text-ter)">Clear checked</button>
    </div>

    <div class="manual-add-form" id="manual-add">
      <div class="form-row">
        <input type="text" id="manual-name" placeholder="Item name" style="flex:2;min-width:130px" />
        <select id="manual-cat" style="flex:1;min-width:110px">
          <option value="Pantry">Pantry</option>
          <option value="Dairy">Dairy</option>
          <option value="Produce">Produce</option>
          <option value="Frozen">Frozen</option>
          <option value="Meat">Meat</option>
          <option value="Bathroom">Bathroom</option>
          <option value="Cleaning">Cleaning</option>
          <option value="Snacks">Snacks</option>
          <option value="Drinks">Drinks</option>
          <option value="Spices">Spices</option>
          <option value="Other">Other</option>
        </select>
        <button onclick="confirmManual()" style="font-weight:500">Add</button>
        <button onclick="toggleManualAdd()" style="color:var(--text-ter)">Cancel</button>
      </div>
    </div>

    <div class="grocery-list" id="grocery-list"></div>
  </div>
</div>

<div class="save-indicator" id="save-indicator">Saved</div>

<script>
const CATS = ['All','Pantry','Dairy','Produce','Frozen','Meat','Bathroom','Cleaning','Snacks','Drinks','Spices','Other'];
let activeCat = 'All';
let activeTab = 'inventory';
let showManual = false;
let nextId = 1000;
let nextGId = 2000;

const DEFAULT_ITEMS = [
  {id:1,name:'Toilet paper',cat:'Bathroom',qty:4,unit:'rolls',low:4},
  {id:2,name:'Paper towels',cat:'Bathroom',qty:2,unit:'rolls',low:2},
  {id:3,name:'Milk',cat:'Dairy',qty:1,unit:'litre',low:1},
  {id:4,name:'Eggs',cat:'Dairy',qty:12,unit:'eggs',low:6},
  {id:5,name:'Butter',cat:'Dairy',qty:1,unit:'pack',low:1},
  {id:6,name:'Bread',cat:'Pantry',qty:1,unit:'loaf',low:1},
  {id:7,name:'Rice',cat:'Pantry',qty:2,unit:'kg',low:1},
  {id:8,name:'Pasta',cat:'Pantry',qty:3,unit:'packs',low:1},
  {id:9,name:'Olive oil',cat:'Pantry',qty:1,unit:'bottle',low:1},
  {id:10,name:'Salt',cat:'Spices',qty:1,unit:'box',low:1},
  {id:11,name:'Dish soap',cat:'Cleaning',qty:1,unit:'bottle',low:1},
  {id:12,name:'Chips',cat:'Snacks',qty:2,unit:'bags',low:1},
  {id:13,name:'Shampoo',cat:'Bathroom',qty:1,unit:'bottle',low:1},
  {id:14,name:'Laundry detergent',cat:'Cleaning',qty:1,unit:'box',low:1},
];

function load() {
  try {
    const saved = localStorage.getItem('hh-inventory');
    if (saved) {
      const data = JSON.parse(saved);
      items = data.items || DEFAULT_ITEMS;
      grocery = data.grocery || [];
      nextId = data.nextId || 1000;
      nextGId = data.nextGId || 2000;
      const lastSaved = data.savedAt ? new Date(data.savedAt) : null;
      if (lastSaved) {
        document.getElementById('last-saved').textContent = 'Last saved ' + lastSaved.toLocaleDateString('en-AU', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      }
    } else {
      items = DEFAULT_ITEMS;
      grocery = [];
    }
  } catch(e) {
    items = DEFAULT_ITEMS;
    grocery = [];
  }
}

function save() {
  try {
    const data = { items, grocery, nextId, nextGId, savedAt: new Date().toISOString() };
    localStorage.setItem('hh-inventory', JSON.stringify(data));
    const ind = document.getElementById('save-indicator');
    ind.classList.add('show');
    document.getElementById('last-saved').textContent = 'Saved just now';
    setTimeout(() => ind.classList.remove('show'), 1800);
  } catch(e) {}
}

let items = [];
let grocery = [];

function getStatus(item) {
  if (item.qty === 0) return 'out';
  if (item.qty <= (item.low != null ? item.low : 1)) return 'low';
  return 'ok';
}

function onList(itemId) {
  return grocery.some(g => g.itemId === itemId);
}

function toggleList(id) {
  const idx = grocery.findIndex(g => g.itemId === id);
  if (idx >= 0) {
    grocery.splice(idx, 1);
  } else {
    const item = items.find(i => i.id === id);
    if (item) grocery.push({gid: nextGId++, itemId: id, name: item.name, cat: item.cat, checked: false});
  }
  save(); render(); renderGrocery();
}

function addItem() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { document.getElementById('new-name').focus(); return; }
  const cat = document.getElementById('new-cat').value;
  const qty = parseInt(document.getElementById('new-qty').value) || 0;
  const unit = document.getElementById('new-unit').value.trim() || 'units';
  const low = parseInt(document.getElementById('new-low').value);
  items.push({id: nextId++, name, cat, qty, unit, low: isNaN(low) ? 1 : low});
  ['new-name','new-qty','new-unit','new-low'].forEach(id => document.getElementById(id).value = '');
  save(); render();
}

function changeQty(id, delta) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  save(); render(); renderGrocery();
}

function removeItem(id) {
  if (!confirm('Remove this item from inventory?')) return;
  items = items.filter(i => i.id !== id);
  grocery = grocery.filter(g => g.itemId !== id);
  save(); render(); renderGrocery();
}

function addAllLow() {
  let added = 0;
  items.forEach(item => {
    const s = getStatus(item);
    if ((s === 'low' || s === 'out') && !onList(item.id)) {
      grocery.push({gid: nextGId++, itemId: item.id, name: item.name, cat: item.cat, checked: false});
      added++;
    }
  });
  if (added === 0) alert('No low or out-of-stock items to add.');
  save(); render(); renderGrocery();
}

function clearChecked() {
  grocery = grocery.filter(g => !g.checked);
  save(); render(); renderGrocery();
}

function toggleGroceryCheck(gid) {
  const g = grocery.find(x => x.gid === gid);
  if (g) g.checked = !g.checked;
  save(); renderGrocery();
}

function removeGrocery(gid) {
  grocery = grocery.filter(x => x.gid !== gid);
  save(); render(); renderGrocery();
}

function toggleManualAdd() {
  showManual = !showManual;
  document.getElementById('manual-add').style.display = showManual ? 'block' : 'none';
  if (showManual) document.getElementById('manual-name').focus();
}

function confirmManual() {
  const name = document.getElementById('manual-name').value.trim();
  if (!name) return;
  const cat = document.getElementById('manual-cat').value;
  grocery.push({gid: nextGId++, itemId: null, name, cat, checked: false});
  document.getElementById('manual-name').value = '';
  showManual = false;
  document.getElementById('manual-add').style.display = 'none';
  save(); renderGrocery();
}

function setCat(c) { activeCat = c; render(); }

function showTab(t) {
  activeTab = t;
  document.getElementById('tab-inventory').style.display = t === 'inventory' ? 'block' : 'none';
  document.getElementById('tab-grocery').style.display = t === 'grocery' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && t === 'inventory') || (i === 1 && t === 'grocery'));
  });
  if (t === 'grocery') renderGrocery();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = items.filter(item =>
    (activeCat === 'All' || item.cat === activeCat) &&
    item.name.toLowerCase().includes(search)
  );

  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-ok').textContent = items.filter(i => getStatus(i) === 'ok').length;
  document.getElementById('s-low').textContent = items.filter(i => getStatus(i) === 'low').length;
  document.getElementById('s-out').textContent = items.filter(i => getStatus(i) === 'out').length;

  const cf = document.getElementById('cat-filter');
  cf.innerHTML = CATS.map(c =>
    `<button class="cat-pill${activeCat === c ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');

  const grid = document.getElementById('item-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No items found. Add one above!</div>';
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const s = getStatus(item);
    const listed = onList(item.id);
    const cardClass = listed ? 'on-list' : (s === 'low' ? 'low' : s === 'out' ? 'out' : '');
    const badgeClass = listed ? 'badge-list' : (s === 'ok' ? 'badge-ok' : s === 'low' ? 'badge-low' : 'badge-out');
    const badgeText = listed ? 'On list' : (s === 'ok' ? 'In stock' : s === 'low' ? 'Low' : 'Out of stock');
    return `
    <div class="item-card ${cardClass}">
      <button class="remove-item-btn" onclick="removeItem(${item.id})" title="Remove item">×</button>
      <div class="item-name">${item.name}</div>
      <div class="item-cat">${item.cat}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
        <span class="qty-val">${item.qty}</span>
        <span class="qty-unit">${item.unit}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
      </div>
      <span class="status-badge ${badgeClass}">${badgeText}</span>
      <button class="list-btn ${listed ? 'on' : ''}" onclick="toggleList(${item.id})">
        ${listed ? '✓ Remove from grocery list' : '+ Add to grocery list'}
      </button>
    </div>`;
  }).join('');

  updateGroceryBadge();
}

function renderGrocery() {
  const pending = grocery.filter(g => !g.checked).length;
  const done = grocery.filter(g => g.checked).length;
  document.getElementById('g-total').textContent = pending;
  document.getElementById('g-done').textContent = done;
  updateGroceryBadge();

  const list = document.getElementById('grocery-list');
  if (!grocery.length) {
    list.innerHTML = '<div class="empty">Your grocery list is empty.<br>Add items from inventory or use the button above.</div>';
    return;
  }

  const sorted = [...grocery].sort((a, b) => a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name));
  let html = '';
  let lastCat = null;
  sorted.forEach(g => {
    if (g.cat !== lastCat) {
      html += `<div class="grocery-group-label">${g.cat}</div>`;
      lastCat = g.cat;
    }
    html += `<div class="grocery-item${g.checked ? ' checked' : ''}">
      <input type="checkbox" ${g.checked ? 'checked' : ''} onchange="toggleGroceryCheck(${g.gid})" />
      <span class="grocery-item-name">${g.name}</span>
      <button class="grocery-remove" onclick="removeGrocery(${g.gid})" title="Remove">×</button>
    </div>`;
  });
  list.innerHTML = html;
}

function updateGroceryBadge() {
  const count = grocery.filter(g => !g.checked).length;
  const badge = document.getElementById('grocery-badge');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline-block' : 'none';
}

document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('manual-name').addEventListener('keydown', e => { if (e.key === 'Enter') confirmManual(); });

load();
render();
renderGrocery();
</script>
</body>
</html>
